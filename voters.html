<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=dashboard.html">
  <title>Redirecting | Villimale Campaign Manager</title>
  <script>
    const target = new URL('dashboard.html', location.href);
    target.search = location.search;
    location.replace(target.toString());
  </script>
</head>
<body>
  <p>Opening Dashboard...</p>
  <p><a id="dashboardLink" href="dashboard.html">Go to Dashboard</a></p>
  <script>
    document.getElementById('dashboardLink').href = 'dashboard.html' + location.search;
  </script>
</body>
</html>
