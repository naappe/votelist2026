<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Residents | Villimale Campaign Manager</title>
  <meta http-equiv="refresh" content="0; url=residents.html?party=PNC&section=voters">
  <script>
    const params = new URLSearchParams(location.search);
    const party = params.get('party') || 'PNC';
    const section = params.get('section') || 'voters';
    const target = new URL('residents.html', location.href);
    target.searchParams.set('party', party);
    target.searchParams.set('section', section);
    location.replace(target.toString());
  </script>
</head>
<body>
  <p>Opening Residents...</p>
  <a href="residents.html?party=PNC&section=voters">Open Residents</a>
</body>
</html>
