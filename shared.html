<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Assigned Voter List</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#101828;--muted:#667085;--line:#e4e7ec;--blue:#1f3b66;--soft:#eef4ff;--shadow:0 16px 40px rgba(16,24,40,.08)}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{width:min(760px,calc(100% - 28px));margin:18px auto 48px}
    .top{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
    h1{margin:0 0 5px;font-size:24px;letter-spacing:-.03em;line-height:1.1}
    p{margin:0;color:var(--muted);line-height:1.45;font-weight:700}
    .count{display:inline-flex;margin-top:12px;padding:7px 11px;border-radius:999px;background:var(--soft);color:#1d4ed8;font-size:13px;font-weight:950}
    .grid{display:grid;gap:12px}
    .card{display:grid;grid-template-columns:74px 1fr;gap:12px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:var(--shadow)}
    .photo{width:74px;height:74px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#eef2ff;display:grid;place-items:center;color:#1f3b66;font-size:20px;font-weight:950}
    .photo img{width:100%;height:100%;object-fit:cover;display:block}
    .info{min-width:0}
    .name{font-size:18px;font-weight:950;letter-spacing:-.02em;margin-bottom:8px;line-height:1.15}
    .line{display:flex;gap:7px;align-items:flex-start;color:#344054;font-size:14px;font-weight:800;line-height:1.35;margin-top:4px;word-break:break-word}
    .label{min-width:58px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding-top:2px}
    .empty{padding:28px;text-align:center;color:var(--muted);font-weight:900;background:var(--card);border:1px solid var(--line);border-radius:16px}
    @media(max-width:520px){.wrap{width:min(100% - 20px,760px);margin-top:10px}.card{grid-template-columns:62px 1fr;border-radius:14px;padding:10px}.photo{width:62px;height:62px;border-radius:12px}.name{font-size:17px}.line{font-size:13px}.label{min-width:50px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <h1>Assigned Voter List</h1>
      <p>Read-only assignment view. No login is required. Only safe voter details are shown.</p>
      <div id="count" class="count">Loading...</div>
    </section>
    <section id="content" class="grid"></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=20260705-11"></script>
  <script>
    function decodePayload(value) {
      try {
        const padded = String(value || '').replace(/-/g, '+').replace(/_/g, '/').padEnd(Math.ceil(String(value || '').length / 4) * 4, '=');
        return JSON.parse(decodeURIComponent(escape(atob(padded))));
      } catch (error) {
        return [];
      }
    }
    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }
    function initials(name) {
      return String(name || '?').trim().split(/\s+/).slice(0, 2).map((part) => part[0] || '').join('').toUpperCase();
    }
    function photo(row) {
      return row.photo ? `<img src="${esc(row.photo)}" alt="${esc(row.name || 'Voter photo')}" loading="lazy">` : esc(initials(row.name));
    }
    function render(rows) {
      document.getElementById('count').textContent = rows.length ? `${rows.length} assigned voter${rows.length === 1 ? '' : 's'}` : 'No voters selected';
      document.getElementById('content').innerHTML = rows.length ? rows.map((row) => `
        <article class="card">
          <div class="photo">${photo(row)}</div>
          <div class="info">
            <div class="name">${esc(row.name)}</div>
            <div class="line"><span class="label">Mobile</span><span>${esc(row.mobile || 'No phone')}</span></div>
            <div class="line"><span class="label">Address</span><span>${esc(row.house)}</span></div>
            <div class="line"><span class="label">ID Card</span><span>${esc(row.id)}</span></div>
          </div>
        </article>
      `).join('') : '<div class="empty">This assignment link has no selected voter data.</div>';
    }
    async function loadShare() {
      const params = new URLSearchParams(location.search);
      const token = params.get('s');
      if (!token) {
        const rows = decodePayload(params.get('list')).filter((row) => row && (row.id || row.name || row.house || row.mobile || row.photo));
        render(rows);
        return;
      }
      try {
        const client = window.supabase.createClient(window.APP_CONFIG.supabaseUrl, window.APP_CONFIG.supabaseKey);
        const { data, error } = await client
          .from('assignment_shares')
          .select('payload')
          .eq('token', token)
          .maybeSingle();
        if (error) throw error;
        render(Array.isArray(data?.payload) ? data.payload : []);
      } catch (error) {
        document.getElementById('count').textContent = 'Could not open link';
        document.getElementById('content').innerHTML = `<div class="empty">${esc(error.message || 'This assignment link could not be loaded.')}</div>`;
      }
    }
    loadShare();
  </script>
</body>
</html>
