<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Self Assign Voters</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#101828;--muted:#667085;--line:#e4e7ec;--blue:#2563eb;--dark:#101828;--soft:#eef4ff;--green:#16a34a;--green-bg:#dcfce7;--shadow:0 16px 40px rgba(16,24,40,.08)}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{width:min(820px,calc(100% - 28px));margin:18px auto 48px}
    .top,.tools,.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
    .top{padding:16px;margin-bottom:14px}
    h1{margin:0 0 5px;font-size:24px;letter-spacing:-.03em;line-height:1.1}
    p{margin:0;color:var(--muted);line-height:1.45;font-weight:700}
    .count{display:inline-flex;margin-top:12px;padding:7px 11px;border-radius:999px;background:var(--soft);color:#1d4ed8;font-size:13px;font-weight:950}
    .tools{position:sticky;top:8px;z-index:3;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end;padding:12px;margin-bottom:12px}
    label{display:grid;gap:6px;color:#344054;font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.04em}
    input[type="text"]{width:100%;min-height:44px;border:1px solid #d0d5dd;border-radius:12px;padding:10px 12px;color:var(--ink);font-size:15px;font-weight:800;background:#fff}
    button{border:0;border-radius:12px;min-height:42px;padding:10px 14px;font-weight:950;cursor:pointer;background:var(--dark);color:#fff;white-space:nowrap}
    button.light{background:#fff;color:#1f3b66;border:1px solid #d0d5dd}
    button:disabled{opacity:.55;cursor:not-allowed}
    .grid{display:grid;gap:12px}
    .card{display:grid;grid-template-columns:28px 1fr auto;gap:12px;align-items:center;padding:12px}
    .select{width:20px;height:20px;accent-color:var(--blue)}
    .info{min-width:0}
    .name{font-size:18px;font-weight:950;letter-spacing:-.02em;margin-bottom:8px;line-height:1.15}
    .line{display:grid;grid-template-columns:68px 1fr;gap:8px;color:#344054;font-size:14px;font-weight:800;line-height:1.35;margin-top:4px;word-break:break-word}
    .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding-top:2px}
    .status{display:inline-flex;width:max-content;margin-top:9px;padding:6px 9px;border-radius:999px;background:#f2f4f7;color:#344054;font-size:12px;font-weight:950}
    .status.done{background:var(--green-bg);color:#166534}
    .empty{padding:28px;text-align:center;color:var(--muted);font-weight:900;background:var(--card);border:1px solid var(--line);border-radius:16px}
    .message{margin:0 0 12px;padding:10px 12px;border-radius:12px;background:#eff6ff;color:#1d4ed8;font-weight:900;border:1px solid #bfdbfe}
    .message.error{background:#fef2f2;color:#991b1b;border-color:#fecaca}
    @media(max-width:620px){.wrap{width:min(100% - 20px,820px);margin-top:10px}.tools{grid-template-columns:1fr;position:static}.card{grid-template-columns:28px 1fr}.card button{grid-column:2;width:100%}.name{font-size:17px}.line{grid-template-columns:58px 1fr;font-size:13px}}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <h1>Self Assign Voters</h1>
      <p>Write your name, then assign the voters you will call. No login is required.</p>
      <div id="count" class="count">Loading...</div>
    </section>
    <section class="tools" aria-label="Assignment controls">
      <label>Your name
        <input id="assigneeName" type="text" placeholder="Write your name" autocomplete="name">
      </label>
      <button id="saveSelectedBtn" type="button">Save Selected</button>
    </section>
    <div id="message" class="message" hidden></div>
    <section id="content" class="grid"></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=20260705-11"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('s') || '';
    let rows = [];
    let client = null;

    function decodePayload(value) {
      try {
        const padded = String(value || '').replace(/-/g, '+').replace(/_/g, '/').padEnd(Math.ceil(String(value || '').length / 4) * 4, '=');
        return JSON.parse(decodeURIComponent(escape(atob(padded))));
      } catch (error) {
        return [];
      }
    }
    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }
    function cleanRows(items) {
      return (Array.isArray(items) ? items : [])
        .filter((row) => row && (row.row_id || row.id || row.name || row.house || row.mobile))
        .map((row) => ({
          row_id: String(row.row_id || row.db_id || row.internal_id || ''),
          id: row.id || '',
          name: row.name || '',
          house: row.house || '',
          mobile: row.mobile || row.phone || '',
          assigned_by: row.assigned_by || row.vote_assigned_by || ''
        }));
    }
    function setMessage(text, isError) {
      const el = document.getElementById('message');
      el.hidden = !text;
      el.textContent = text || '';
      el.className = `message${isError ? ' error' : ''}`;
    }
    function nameValue() {
      return document.getElementById('assigneeName').value.trim();
    }
    function saveName() {
      try { localStorage.setItem('assigner_name', nameValue()); } catch {}
    }
    function loadName() {
      try { document.getElementById('assigneeName').value = localStorage.getItem('assigner_name') || ''; } catch {}
    }
    function render() {
      document.getElementById('count').textContent = rows.length ? `${rows.length} voter${rows.length === 1 ? '' : 's'} in this link` : 'No voters selected';
      document.getElementById('content').innerHTML = rows.length ? rows.map((row) => {
        const assigned = row.assigned_by ? `Assigned to ${row.assigned_by}` : 'Not assigned yet';
        const canAssign = Boolean(token && row.row_id);
        return `
          <article class="card" data-row-id="${esc(row.row_id)}">
            <input class="select" type="checkbox" data-pick="${esc(row.row_id)}" ${canAssign ? '' : 'disabled'} aria-label="Select ${esc(row.name)}">
            <div class="info">
              <div class="name">${esc(row.name || 'Unknown voter')}</div>
              <div class="line"><span class="label">ID</span><span>${esc(row.id || '-')}</span></div>
              <div class="line"><span class="label">Address</span><span>${esc(row.house || '-')}</span></div>
              <div class="line"><span class="label">Mobile</span><span>${esc(row.mobile || 'No phone')}</span></div>
              <span class="status ${row.assigned_by ? 'done' : ''}" data-status="${esc(row.row_id)}">${esc(assigned)}</span>
            </div>
            <button type="button" data-assign="${esc(row.row_id)}" ${canAssign ? '' : 'disabled'}>${row.assigned_by ? 'Change to me' : 'Assign to me'}</button>
          </article>
        `;
      }).join('') : '<div class="empty">This assignment link has no selected voter data.</div>';
    }
    function setBusy(isBusy) {
      document.querySelectorAll('button').forEach((button) => button.disabled = isBusy || button.dataset.wasDisabled === '1');
    }
    async function assignOne(rowId) {
      const assignee = nameValue();
      if (!assignee) {
        setMessage('Write your name first.', true);
        document.getElementById('assigneeName').focus();
        return false;
      }
      if (!token || !rowId) {
        setMessage('This old link is read-only. Ask for a new assignment link.', true);
        return false;
      }
      saveName();
      const { data, error } = await client.rpc('claim_assignment', {
        p_token: token,
        p_voter_row_id: Number(rowId),
        p_assignee_name: assignee
      });
      if (error) {
        setMessage(error.message || 'Could not save assignment.', true);
        return false;
      }
      const saved = Array.isArray(data) ? data[0] : data;
      rows = rows.map((row) => row.row_id === String(rowId) ? { ...row, assigned_by: saved?.vote_assigned_by || assignee } : row);
      render();
      setMessage(`Saved. ${saved?.name || 'Voter'} assigned to ${assignee}.`, false);
      return true;
    }
    async function assignSelected() {
      const selected = Array.from(document.querySelectorAll('[data-pick]:checked')).map((input) => input.value).filter(Boolean);
      if (!selected.length) {
        setMessage('Tick voters first, or use Assign to me on one card.', true);
        return;
      }
      setBusy(true);
      let saved = 0;
      for (const rowId of selected) {
        if (await assignOne(rowId)) saved += 1;
      }
      setBusy(false);
      document.querySelectorAll('[data-pick]').forEach((input) => input.checked = false);
      if (saved) setMessage(`Saved ${saved} voter${saved === 1 ? '' : 's'} to ${nameValue()}.`, false);
    }
    async function loadShare() {
      loadName();
      document.getElementById('assigneeName').addEventListener('input', saveName);
      document.getElementById('saveSelectedBtn').addEventListener('click', assignSelected);
      document.addEventListener('click', async (event) => {
        const button = event.target.closest('[data-assign]');
        if (!button) return;
        setBusy(true);
        await assignOne(button.dataset.assign);
        setBusy(false);
      });

      if (!token) {
        rows = cleanRows(decodePayload(params.get('list')));
        setMessage('This old link is read-only. Ask for a new assignment link to save names.', true);
        render();
        return;
      }
      try {
        client = window.supabase.createClient(window.APP_CONFIG.supabaseUrl, window.APP_CONFIG.supabaseKey);
        const { data, error } = await client
          .from('assignment_shares')
          .select('payload')
          .eq('token', token)
          .maybeSingle();
        if (error) throw error;
        rows = cleanRows(data?.payload);
        render();
      } catch (error) {
        document.getElementById('count').textContent = 'Could not open link';
        document.getElementById('content').innerHTML = `<div class="empty">${esc(error.message || 'This assignment link could not be loaded.')}</div>`;
      }
    }
    loadShare();
  </script>
</body>
</html>
