<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shared Voter List</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#101828;--muted:#667085;--line:#e4e7ec;--blue:#2563eb;--shadow:0 18px 45px rgba(16,24,40,.08)}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{width:min(980px,calc(100% - 28px));margin:24px auto 60px}
    .top{background:linear-gradient(135deg,#10204a,#2563eb);color:#fff;border-radius:18px;padding:22px;box-shadow:var(--shadow);margin-bottom:16px}
    h1{margin:0 0 6px;font-size:32px;letter-spacing:-.04em}
    p{margin:0;color:rgba(255,255,255,.82);line-height:1.5}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
    .count{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:950;color:#344054}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:13px 16px;border-bottom:1px solid var(--line);vertical-align:top}
    th{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);background:#fbfcfe}
    td{font-weight:800}
    tr:last-child td{border-bottom:0}
    .empty{padding:28px;text-align:center;color:var(--muted);font-weight:900}
    @media(max-width:720px){
      table,thead,tbody,tr,th,td{display:block}
      thead{display:none}
      tr{border-bottom:1px solid var(--line);padding:10px 0}
      td{border:0;padding:6px 16px}
      td:before{content:attr(data-label);display:block;margin-bottom:2px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <h1>Shared Voter List</h1>
      <p>Read-only selected voters. Only ID, name, house, and mobile are shown.</p>
    </section>
    <section class="panel">
      <div id="count" class="count">Loading...</div>
      <div id="content"></div>
    </section>
  </main>
  <script>
    function decodePayload(value) {
      try {
        const padded = String(value || '').replace(/-/g, '+').replace(/_/g, '/').padEnd(Math.ceil(String(value || '').length / 4) * 4, '=');
        return JSON.parse(decodeURIComponent(escape(atob(padded))));
      } catch (error) {
        return [];
      }
    }
    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }
    const rows = decodePayload(new URLSearchParams(location.search).get('list'))
      .filter((row) => row && (row.id || row.name || row.house || row.mobile));
    document.getElementById('count').textContent = rows.length ? `${rows.length} selected voter${rows.length === 1 ? '' : 's'}` : 'No voters selected';
    document.getElementById('content').innerHTML = rows.length ? `
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>House</th><th>Mobile</th></tr></thead>
        <tbody>${rows.map((row) => `
          <tr>
            <td data-label="ID">${esc(row.id)}</td>
            <td data-label="Name">${esc(row.name)}</td>
            <td data-label="House">${esc(row.house)}</td>
            <td data-label="Mobile">${esc(row.mobile)}</td>
          </tr>
        `).join('')}</tbody>
      </table>
    ` : '<div class="empty">This shared link has no selected voter data.</div>';
  </script>
</body>
</html>
