<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Residents | Villimale Campaign</title>
  <link rel="stylesheet" href="css/residents-simple.css?v=20260709-assign-summary-1">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html?v=20260709-assign-summary-1"><span class="mark"></span><span>Villimale Campaign</span></a>
    <nav id="nav" class="nav"></nav>
  </header>
  <main class="page">
    <section class="hero">
      <div>
        <p class="eyebrow">Residents</p>
        <h1><span id="partyName">PNC</span> Residents</h1>
        <p>No login. Direct campaign workspace.</p>
      </div>
      <button id="refreshBtn" class="btn" type="button" onclick="location.reload()">Refresh</button>
    </section>
    <section class="stats">
      <article class="stat"><span>Total Residents</span><strong id="total">0</strong></article>
      <article class="stat green"><span>Will Vote</span><strong id="will">0</strong></article>
      <article class="stat red"><span>Not Vote</span><strong id="notvote">0</strong></article>
      <article class="stat orange"><span>Pending</span><strong id="pending">0</strong></article>
      <article class="stat red"><span>Need Call / Visit</span><strong id="need">0</strong></article>
    </section>
    <section class="panel">
      <div class="search">
        <label>Search residents<input id="searchInput" type="search" placeholder="Name, ID, phone, house, party"></label>
        <label>House<select id="houseSelect"><option value="">All houses</option></select></label>
        <button id="clearBtn" class="btn" type="button">Clear Search</button>
      </div>
      <div id="status" class="status"></div>
    </section>
    <section class="panel">
      <div class="panel-head"><h2>Residents</h2><span id="sectionTotal" class="pill">0 residents</span></div>
      <div id="list" class="list"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=20260709-assign-summary-1"></script>
  <script src="js/residents-loader.js?v=20260709-statsfix-3"></script>
  <script src="js/residents-display-fix.js?v=20260709-assigned-visible-2"></script>
  <script src="js/assignment-summary-panel.js?v=20260709-assign-summary-1"></script>
</body>
</html>
